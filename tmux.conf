# ============================================================
#  tmux.conf  —  config de Agus
#  Optimizado para: trabajo remoto vía SSH + sesiones
#  paralelas de Claude Code.
#  Sin keybinds estilo vim. Copy/paste nativo del terminal
#  (Ctrl+Shift+C / Ctrl+Shift+V) + clipboard sobre SSH (OSC52).
# ============================================================


# ------------------------------------------------------------
#  COMPORTAMIENTO GENERAL
# ------------------------------------------------------------
set -g mouse on                       # scroll, click en panes, arrastrar bordes
set -g history-limit 100000           # scrollback enorme (output largo de Claude)
set -g base-index 1                   # las windows empiezan en 1, no en 0
setw -g pane-base-index 1             # idem para panes
set -g renumber-windows on            # cerrás la window 2 -> la 3 pasa a ser 2
set -sg escape-time 0                 # sin delay al apretar ESC
set -g focus-events on                # las apps saben qué pane está activo
set -g display-time 2000              # los mensajes de status duran 2s
set -g status-interval 5              # refresca el status bar cada 5s

# Colores reales (true color) + terminfo correcto
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-overrides ",xterm-256color:Tc"

# Clipboard sobre SSH usando OSC52: lo que copiás en el server
# llega al portapapeles de tu Mint local. Clave para remoto.
set -g set-clipboard on


# ------------------------------------------------------------
#  PREFIX:  Ctrl + Espacio
#  (Ctrl+b es incómodo; Ctrl+a pisa "ir al inicio de línea" de bash)
# ------------------------------------------------------------
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Recargar config sin reiniciar:  prefix + r
bind r source-file ~/.tmux.conf \; display "tmux.conf recargado"


# ------------------------------------------------------------
#  SPLITS Y WINDOWS  (mantienen el directorio actual)
# ------------------------------------------------------------
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"   # prefix + |  -> split vertical
bind - split-window -v -c "#{pane_current_path}"   # prefix + -  -> split horizontal
bind c new-window   -c "#{pane_current_path}"       # prefix + c  -> nueva window


# ------------------------------------------------------------
#  NAVEGACIÓN ENTRE PANES  (flechas, SIN teclas vim)
# ------------------------------------------------------------
# Con prefix + flecha:
bind Left  select-pane -L
bind Right select-pane -R
bind Up    select-pane -U
bind Down  select-pane -D

# Sin prefix, con Alt + flecha (más rápido para el día a día):
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D


# ------------------------------------------------------------
#  REDIMENSIONAR PANES  (prefix + Shift + flecha, repetible)
# ------------------------------------------------------------
bind -r S-Left  resize-pane -L 5
bind -r S-Right resize-pane -R 5
bind -r S-Up    resize-pane -U 5
bind -r S-Down  resize-pane -D 5

# Zoom del pane actual a pantalla completa:  prefix + z  (default)


# ------------------------------------------------------------
#  CAMBIAR DE WINDOW  (Alt + número, sin prefix)
# ------------------------------------------------------------
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9


# ------------------------------------------------------------
#  POPUP FLOTANTE  (estilo Zellij)
# ------------------------------------------------------------
# prefix + g  -> shell flotante temporal sobre tu layout
bind g display-popup -E -w 80% -h 80%
# prefix + G  -> sesión "scratch" persistente (notas / pruebas)
bind G display-popup -E -w 80% -h 80% "tmux attach -t scratch || tmux new -s scratch"


# ------------------------------------------------------------
#  COPY / PASTE  (mouse -> portapapeles del sistema)
# ------------------------------------------------------------
# Al soltar el mouse después de seleccionar: copia y sale de copy mode.
# Con set-clipboard on, esto va al portapapeles real vía OSC52.
bind -T copy-mode    MouseDragEnd1Pane send -X copy-selection-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-and-cancel
# Pegar buffer de tmux:  prefix + ]   (o Ctrl+Shift+V del terminal)
#
# TIP: para usar el copy NATIVO del terminal (Ctrl+Shift+C), mantené
# apretado SHIFT mientras seleccionás con el mouse — eso saltea el
# manejo de mouse de tmux y usa la selección del terminal.


# ------------------------------------------------------------
#  MONITOREO DE ACTIVIDAD
# ------------------------------------------------------------
setw -g monitor-activity on           # marca windows con output nuevo
set -g visual-activity off            # sin popup molesto, solo highlight


# ------------------------------------------------------------
#  TÍTULOS DE PANES  (saber qué corre en cada uno)
# ------------------------------------------------------------
set -g pane-border-status top
set -g pane-border-format " #{pane_index}: #{pane_current_command} "


# ============================================================
#  STATUS BAR  (paleta Catppuccin Mocha, hecha a mano:
#  cero dependencia de plugins de tema = nunca se rompe)
# ============================================================
set -g status-position top
set -g status-justify left
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left-length 60
set -g status-right-length 80

# Izquierda: nombre de sesión + indicador de prefix
set -g status-left "#[bg=#cba6f7,fg=#1e1e2e,bold] #S #[bg=#1e1e2e,fg=#cba6f7]#{?client_prefix,#[fg=#f9e2af] PREFIX,} "

# Windows
setw -g window-status-format         "#[fg=#6c7086] #I:#W "
setw -g window-status-current-format "#[bg=#313244,fg=#89b4fa,bold] #I:#W "
setw -g window-status-separator ""

# Derecha: usuario@host + hora  (el hostname te dice en qué server estás)
set -g status-right "#[fg=#94e2d5]#(whoami)@#H #[fg=#6c7086]| #[fg=#a6e3a1]%d/%m #[fg=#f9e2af]%H:%M "

# Bordes de panes
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#cba6f7"

# Mensajes / modo comando
set -g message-style "bg=#f9e2af,fg=#1e1e2e,bold"
set -g mode-style "bg=#cba6f7,fg=#1e1e2e"


# ============================================================
#  PLUGINS  (gestionados con TPM)
#  prefix + I = instalar | prefix + U = actualizar | prefix + alt+u = limpiar
# ============================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'          # defaults razonables

# --- Persistencia (lo más importante para sesiones remotas largas) ---
set -g @plugin 'tmux-plugins/tmux-resurrect'         # guarda/restaura sesiones
set -g @plugin 'tmux-plugins/tmux-continuum'         # autosave cada 5 min

# --- Clipboard / copiado ---
set -g @plugin 'tmux-plugins/tmux-yank'              # copia al portapapeles del sistema

# --- SSH / remoto ---
set -g @plugin 'MunifTanjim/tmux-suspend'            # suspende tmux local (F12) para tmux anidado
set -g @plugin 'tony-sol/tmux-current-pane-hostname' # user@host en el status

# --- Calidad de vida ---
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'  # avisa cuando el prefix está activo
set -g @plugin 'rickstaa/tmux-notify'                # notifica cuando un proceso termina
set -g @plugin 'ofirgall/tmux-window-name'           # nombra windows según lo que corre

# --- Sesiones (descomentá si instalás fzf + zoxide; ver bootstrap.sh) ---
# set -g @plugin 'omerxx/tmux-sessionx'              # gestor de sesiones con preview (prefix+o)

# --- Copiado rápido sin mouse (descomentá si tenés rust/cargo) ---
# set -g @plugin 'fcsonline/tmux-thumbs'             # hints estilo Vimium para copiar
# set -g @plugin 'laktak/extrakto'                   # fuzzy extract del scrollback (prefix+Tab)

# --- Config de plugins ---
set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'
# tmux-notify: prefix + m  monitorea el pane actual y avisa al terminar
set -g @tnotify-verbose 'on'
# tmux-suspend: tecla para suspender el tmux local (default F12)
set -g @suspend_key 'F12'


# ------------------------------------------------------------
#  OVERRIDES POR MÁQUINA  (no versionado — ver README)
# ------------------------------------------------------------
if-shell "[ -f ~/.tmux.conf.local ]" "source-file ~/.tmux.conf.local"


# ------------------------------------------------------------
#  INICIALIZAR TPM  (debe ir SIEMPRE al final del archivo)
# ------------------------------------------------------------
run '~/.tmux/plugins/tpm/tpm'
